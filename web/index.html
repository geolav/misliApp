<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Misli — мысли вслух</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #fffaf3;
            --bg-2: #f8efe3;
            --card: rgba(255, 255, 255, 0.88);
            --line: #eadfd0;
            --ink: #17252f;
            --muted: #5f6f77;
            --accent: #ff6f3c;
            --accent-2: #12a89d;
            --danger: #b64235;
            --radius: 18px;
            --shadow: 0 22px 48px rgba(68, 51, 38, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background:
                    radial-gradient(1100px 600px at -10% -20%, #ffe7cf 0%, transparent 70%),
                    radial-gradient(900px 500px at 110% 0%, #d6fff7 0%, transparent 65%),
                    linear-gradient(170deg, var(--bg-1), var(--bg-2));
        }

        .wrap {
            width: min(980px, 100% - 24px);
            margin: 16px auto 24px;
            animation: app-in 420ms ease-out;
        }

        @keyframes app-in {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }

        .brand {
            font-family: "Sora", sans-serif;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .pill {
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 8px 12px;
            background: #ffffffb8;
            color: var(--muted);
            font-size: 13px;
        }

        .tabs {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: #fffdf9;
            box-shadow: var(--shadow);
        }

        .tab-btn {
            border: 0;
            border-radius: 12px;
            padding: 12px;
            font-family: inherit;
            font-weight: 600;
            background: #f2e6d9;
            color: #2f3a41;
            cursor: pointer;
            transition: transform 180ms ease, background 180ms ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--accent), #ff905d);
            color: #fff;
        }

        .tab-btn:active { transform: scale(0.98); }

        .screen {
            margin-top: 10px;
            display: none;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px;
            background: var(--card);
            box-shadow: var(--shadow);
        }

        .screen.active { display: block; }
        .grid { display: grid; gap: 12px; }
        .two-col { grid-template-columns: 1.2fr .8fr; }

        .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
            background: #fff;
            animation: item-in 260ms ease both;
        }

        @keyframes item-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2, h3 { margin: 0 0 10px; font-family: "Sora", sans-serif; }
        p { margin: 6px 0; }
        .muted { color: var(--muted); font-size: 14px; }
        .meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 13px; }
        .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

        button, input, textarea {
            font: inherit;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px 12px;
            background: #fff;
            color: var(--ink);
        }

        textarea { min-height: 120px; resize: vertical; }
        form { display: grid; gap: 10px; }

        .btn-pri { background: var(--accent); color: #fff; border-color: transparent; }
        .btn-ghost { background: #fff8f3; }
        .btn-alt { background: #e9fffc; border-color: #bfe9e6; color: #0d726b; }
        .btn-danger { background: #fff1ef; border-color: #f5d0cc; color: var(--danger); }

        .stat-line {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            background: #fff8f2;
        }

        .stat b { display: block; font-size: 18px; }
        .hide { display: none !important; }

        #registrationGate {
            position: fixed;
            inset: 0;
            background: rgba(16, 24, 31, 0.38);
            display: grid;
            place-items: center;
            padding: 16px;
            z-index: 10;
        }

        #registrationGate .gate-card {
            width: min(560px, 100%);
            border: 1px solid var(--line);
            border-radius: 18px;
            background: #fff;
            padding: 18px;
            box-shadow: 0 30px 72px rgba(5, 8, 9, 0.26);
        }

        dialog {
            width: min(760px, calc(100% - 20px));
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 0;
        }

        dialog::backdrop { background: rgba(17, 28, 36, 0.45); }
        .dialog-body { padding: 14px; }

        @media (max-width: 820px) {
            .two-col { grid-template-columns: 1fr; }
            .tabs { position: sticky; bottom: 8px; z-index: 5; background: #fff; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <header class="topbar">
        <div>
            <div class="brand">Misli · мысли вслух</div>
            <div class="muted">делись мыслями, читай других</div>
        </div>
        <div id="userPill" class="pill">загрузка...</div>
    </header>

    <nav class="tabs" id="tabs">
        <button class="tab-btn active" data-screen="feed">📰 Лента</button>
        <button class="tab-btn" data-screen="search">🔍 Поиск</button>
        <button class="tab-btn" data-screen="create">✍️ Написать</button>
        <button class="tab-btn" data-screen="profile">👤 Профиль</button>
    </nav>

    <section class="screen active" id="feed">
        <div class="grid" id="feedList"></div>
    </section>

    <section class="screen" id="search">
        <div class="grid two-col">
            <div class="card">
                <h3>Найти человека</h3>
                <form id="searchForm">
                    <input id="searchInput" placeholder="@username" required>
                    <button class="btn-pri" type="submit">Найти</button>
                </form>
                <div id="searchResult" class="muted" style="margin-top:10px;">🔍 Введите username</div>
            </div>
            <div class="card">
                <h3>Посты пользователя</h3>
                <div id="searchPosts" class="muted">—</div>
            </div>
        </div>
    </section>

    <section class="screen" id="create">
        <div class="card">
            <h3>Новая мысль</h3>
            <form id="createForm">
                <textarea id="postContent" placeholder="Что у тебя нового?" required></textarea>
                <input id="postMedia" placeholder="https://ссылка на медиа (необязательно)">
                <button class="btn-pri" type="submit">Опубликовать</button>
            </form>
        </div>
    </section>

    <section class="screen" id="profile">
        <div id="profileRoot"></div>
    </section>
</div>

<div id="registrationGate" class="hide">
    <div class="gate-card">
        <h2>👋 Добро пожаловать</h2>
        <p class="muted">Похоже, у тебя ещё нет профиля. Создадим?</p>
        <form id="registerForm">
            <input id="regName" placeholder="Твоё имя" required>
            <input id="regUsername" placeholder="username (без @" value="">
            <textarea id="regBio" placeholder="Расскажи о себе (можно пропустить)"></textarea>
            <button class="btn-pri" type="submit">Создать профиль</button>
        </form>
    </div>
</div>

<dialog id="postDialog">
    <div class="dialog-body">
        <div id="dialogContent"></div>
    </div>
</dialog>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // ========== ИНИЦИАЛИЗАЦИЯ TELEGRAM ==========
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.setHeaderColor("#ffffff");
        tg.setBackgroundColor("#fffaf3");
    }

    // ========== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ==========
    const state = {
        currentUser: null,
        feed: [],
        searchResult: null,
        searchResultPosts: []
    };

    // Получаем tg_id из Telegram или из URL для теста
    const tgId = tg?.initDataUnsafe?.user?.id?.toString() || '';
    const urlTgId = new URLSearchParams(window.location.search).get('tg_id');
    const effectiveTgId = tgId || urlTgId || '';

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function formatDate(dateStr) {
        try {
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return dateStr;
            return d.toLocaleString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });
        } catch {
            return dateStr;
        }
    }

    function updateUserPill() {
        const el = document.getElementById("userPill");
        if (!state.currentUser) {
            el.textContent = "👤 гость";
            return;
        }
        el.textContent = `${state.currentUser.name} @${state.currentUser.username}`;
    }

    function setScreen(target) {
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.screen === target);
        });
        document.querySelectorAll(".screen").forEach(screen => {
            screen.classList.toggle("active", screen.id === target);
        });
    }

    // ========== API ВЫЗОВЫ ==========
    async function apiCall(endpoint, method = 'GET', body = null) {
        if (!effectiveTgId) {
            throw new Error('No Telegram ID available');
        }

        const url = `/api${endpoint}${endpoint.includes('?') ? '&' : '?'}tg_id=${encodeURIComponent(effectiveTgId)}`;
        const options = {
            method,
            headers: { 'Content-Type': 'application/json' }
        };

        if (body) {
            options.body = JSON.stringify(body);
        }

        const response = await fetch(url, options);
        const data = await response.json();

        if (!data.success) {
            throw new Error(data.message || 'API error');
        }

        return data.data;
    }

    // ========== ЗАГРУЗКА ДАННЫХ ==========
    async function loadFeed() {
        try {
            const data = await apiCall('/feed')
            state.feed = data?.posts || [];
            console.log('Feed loaded:', state.feed.length, 'posts');
            renderFeed();
        } catch (e) {
            console.error('Feed error:', e);
            document.getElementById("feedList").innerHTML =
                `<div class="card muted">❌ Ошибка загрузки ленты: ${e.message}</div>`;
        }
    }

    async function loadProfile() {
        try {
            state.currentUser = await apiCall('/profile');
            updateUserPill();

            // Если пользователь есть — скрываем окно регистрации
            document.getElementById("registrationGate").classList.add('hide');

            renderProfile();
        } catch (e) {
            // Если пользователь не найден — показываем регистрацию
            if (e.message.includes('not found')) {
                document.getElementById("registrationGate").classList.remove('hide');
                // Подставляем username из Telegram, если есть
                const tgUsername = tg?.initDataUnsafe?.user?.username || '';
                document.getElementById("regUsername").value = tgUsername;
            }
            updateUserPill();
        }
    }

    async function searchUser(username) {
        try {
            const user = await apiCall(`/user/search?username=${encodeURIComponent(username)}`);
            state.searchResult = user;
            renderSearchResult(user);

            // Загружаем посты найденного пользователя
            // Пока фильтруем из ленты, позже можно сделать отдельный endpoint
            state.searchResultPosts = state.feed.filter(p => p.author_tg_id === user.tg_id);
            renderSearchPosts();
        } catch (e) {
            alert('❌ Пользователь не найден');
            state.searchResult = null;
            state.searchResultPosts = [];
            renderSearchResult(null);
        }
    }

    async function createPost(content, mediaUrl) {
        try {
            await apiCall('/post/create', 'POST', {
                content,
                media_url: mediaUrl || ''
            });
            await loadFeed();
            await loadProfile();
            setScreen('feed');
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            alert('❌ Ошибка: ' + e.message);
        }
    }

    async function deletePost(postId) {
        if (!confirm('🗑️ Точно удалить пост?')) return;
        try {
            await apiCall(`/post/delete?post_id=${postId}`, 'POST');
            await loadFeed();
            await loadProfile();
            if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        } catch (e) {
            alert('❌ Ошибка удаления: ' + e.message);
        }
    }

    async function addComment(postId, content) {
        if (!content.trim()) return;
        try {
            await apiCall('/post/comment', 'POST', { post_id: postId, content });
            // Обновляем пост в диалоге
            const post = state.feed.find(p => p.post_id === postId);
            if (post) {
                post.comments_count = (post.comments_count || 0) + 1;
                openPost(postId);
            }
            if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        } catch (e) {
            alert('❌ Ошибка комментария: ' + e.message);
        }
    }

    // ========== РЕНДЕРИНГ ==========
    function renderFeed() {
        const root = document.getElementById("feedList");

        if (!state.currentUser) {
            root.innerHTML = `<div class="card">👋 Зарегистрируйся, чтобы видеть ленту</div>`;
            return;
        }

        if (!state.feed.length) {
            root.innerHTML = `<div class="card">📭 Лента пуста. Подпишись на кого-нибудь!</div>`;
            return;
        }

        root.innerHTML = state.feed.map(post => `
        <article class="card">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <b>@${post.author_username || 'unknown'}</b>
            <span class="muted">${formatDate(post.created_at)}</span>
          </div>
          <p style="margin-top:8px;">${post.content}</p>
          ${post.media_url ? `
            <p class="muted">
              <a href="${post.media_url}" target="_blank" rel="noreferrer">🔗 ссылка на медиа</a>
            </p>
          ` : ''}
          <div class="meta">
            <span>💬 ${post.comments_count || 0} комментариев</span>
          </div>
          <div class="actions">
            <button class="btn-alt" data-open="${post.post_id}">💬 Открыть</button>
            ${post.author_tg_id === effectiveTgId ? `
              <button class="btn-danger" data-delete="${post.post_id}">🗑️ Удалить</button>
            ` : ''}
          </div>
        </article>
      `).join("");
    }

    function renderProfile() {
        const root = document.getElementById("profileRoot");

        if (!state.currentUser) {
            root.innerHTML = `<div class="card">👋 Зарегистрируйся</div>`;
            return;
        }

        const user = state.currentUser;
        const myPosts = state.feed.filter(p => p.author_tg_id === effectiveTgId);

        root.innerHTML = `
        <div class="grid two-col">
          <div class="card">
            <h3>${user.name}</h3>
            <p class="muted">@${user.username}</p>
            <p>${user.bio || '— био не указано —'}</p>
            <div class="stat-line">
              <div class="stat"><b>${myPosts.length}</b><small>постов</small></div>
              <div class="stat"><b>${user.followers_count || 0}</b><small>подписчиков</small></div>
              <div class="stat"><b>${user.following_count || 0}</b><small>подписок</small></div>
            </div>
          </div>
          <div class="card">
            <h3>Мои посты</h3>
            <div class="grid">
              ${myPosts.length ? myPosts.map(post => `
                <div class="card" style="padding:8px;">
                  <p style="margin:0;">${post.content}</p>
                  <div class="meta" style="margin-top:4px;">
                    <span>${formatDate(post.created_at)}</span>
                    <span>💬 ${post.comments_count || 0}</span>
                  </div>
                  <div class="actions" style="margin-top:4px;">
                    <button class="btn-alt btn-small" data-open="${post.post_id}">Открыть</button>
                    <button class="btn-danger btn-small" data-delete="${post.post_id}">🗑️</button>
                  </div>
                </div>
              `).join('') : '<p class="muted">Пока нет постов</p>'}
            </div>
          </div>
        </div>
      `;
    }

    function renderSearchResult(user) {
        const resultDiv = document.getElementById("searchResult");

        if (!user) {
            resultDiv.innerHTML = `<p class="muted">🔍 Пользователь не найден</p>`;
            return;
        }

        const isSubscribed = false; // TODO: проверить подписку

        resultDiv.innerHTML = `
        <div class="card">
          <h3>${user.name}</h3>
          <p class="muted">@${user.username}</p>
          <p>${user.bio || '— био не указано —'}</p>
          <div class="actions">
            <button id="subBtn" class="${isSubscribed ? 'btn-ghost' : 'btn-pri'}">
              ${isSubscribed ? '➖ Отписаться' : '➕ Подписаться'}
            </button>
          </div>
        </div>
      `;

        // TODO: добавить обработчик подписки
    }

    function renderSearchPosts() {
        const postsDiv = document.getElementById("searchPosts");

        if (!state.searchResultPosts || !state.searchResultPosts.length) {
            postsDiv.innerHTML = `<p class="muted">📭 Нет постов</p>`;
            return;
        }

        postsDiv.innerHTML = state.searchResultPosts.map(post => `
        <div class="card" style="padding:8px; margin-bottom:8px;">
          <p style="margin:0;">${post.content}</p>
          <div class="meta" style="margin-top:4px;">
            <span>${formatDate(post.created_at)}</span>
            <span>💬 ${post.comments_count || 0}</span>
          </div>
          <div class="actions" style="margin-top:4px;">
            <button class="btn-alt btn-small" data-open="${post.post_id}">Открыть</button>
          </div>
        </div>
      `).join('');
    }

    function openPost(postId) {
        const post = state.feed.find(p => p.post_id === postId);
        if (!post) return;

        const dialog = document.getElementById("postDialog");
        const content = document.getElementById("dialogContent");

        // Здесь можно загрузить комментарии с сервера, пока используем мок
        const comments = []; // TODO: загружать комментарии

        content.innerHTML = `
        <h3>📝 @${post.author_username}</h3>
        <p>${post.content}</p>
        ${post.media_url ? `<p><a href="${post.media_url}" target="_blank">🔗 медиа</a></p>` : ''}
        <p class="muted">${formatDate(post.created_at)}</p>

        <hr>

        <h4>💬 Комментарии</h4>
        <div class="grid" id="commentsList">
          ${comments.length ? comments.map(c => `
            <div class="card">
              <b>@${c.author_username}</b>
              <p>${c.content}</p>
              <small class="muted">${formatDate(c.created_at)}</small>
            </div>
          `).join('') : '<p class="muted">Пока нет комментариев</p>'}
        </div>

        <form id="commentForm" style="margin-top:12px;">
          <input type="hidden" id="commentPostId" value="${postId}">
          <input id="commentInput" placeholder="Напиши комментарий..." required>
          <button class="btn-pri" type="submit">Отправить</button>
        </form>
      `;

        dialog.showModal();

        // Обработчик формы комментария
        document.getElementById("commentForm").onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById("commentInput");
            addComment(postId, input.value);
            input.value = '';
        };
    }

    // ========== ОБРАБОТЧИКИ СОБЫТИЙ ==========
    document.getElementById("tabs").addEventListener("click", (e) => {
        const btn = e.target.closest(".tab-btn");
        if (!btn) return;
        setScreen(btn.dataset.screen);
    });

    document.getElementById("searchForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const username = document.getElementById("searchInput").value.replace("@", "").trim();
        if (username) searchUser(username);
    });

    document.getElementById("createForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const content = document.getElementById("postContent").value.trim();
        const media = document.getElementById("postMedia").value.trim();
        if (content) {
            createPost(content, media);
            e.target.reset();
        }
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const name = document.getElementById("regName").value.trim();
        const username = document.getElementById("regUsername").value.trim().replace("@", "");
        const bio = document.getElementById("regBio").value.trim();

        if (!name || !username) {
            alert('Имя и username обязательны');
            return;
        }

        try {
            // TODO: добавить endpoint для регистрации
            alert('Регистрация пока не подключена к API');
            // После регистрации перезагружаем данные
            await loadProfile();
            await loadFeed();
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    });

    document.body.addEventListener("click", (e) => {
        const openBtn = e.target.closest("[data-open]");
        if (openBtn) {
            openPost(openBtn.dataset.open);
        }

        const deleteBtn = e.target.closest("[data-delete]");
        if (deleteBtn) {
            deletePost(deleteBtn.dataset.delete);
        }
    });

    document.getElementById("postDialog").addEventListener("click", (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const inDialog = rect.top <= e.clientY && e.clientY <= rect.top + rect.height &&
            rect.left <= e.clientX && e.clientX <= rect.left + rect.width;
        if (!inDialog) e.currentTarget.close();
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
        await loadProfile();
        await loadFeed();
    }

    init();
</script>
</body>
</html>
